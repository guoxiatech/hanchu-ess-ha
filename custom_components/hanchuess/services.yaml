device_control:
  name: Device Control
  description: Send control commands to a Hanchuess device
  fields:
    sn:
      name: SN
      description: The serial number of the device
      required: true
      selector:
        text:
    dev_type:
      name: Device Type
      description: The device type (e.g. 2 for inverter)
      required: true
      selector:
        text:
    value:
      name: Value
      description: Key-value pairs of control signals
      required: true
      selector:
        object:
